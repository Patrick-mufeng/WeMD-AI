<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeMD 变体卡片 — 3:4 预览</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
  :root {
    --card-w: 420px;
    --card-h: 560px;
    --gap: 28px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #1a1a1a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    user-select: none;
    -webkit-user-select: none;
    padding: 20px;
  }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn-download {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 24px;
    background: #fff;
    color: #171717;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }
  .btn-download:hover { background:#e0e0e0; transform:translateY(-1px); box-shadow:0 4px 20px rgba(0,0,0,0.4); }
  .btn-download:active { transform:translateY(0); }
  .btn-download:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

  .loading-text {
    color: #aaa;
    font-size: 14px;
    letter-spacing: 1px;
  }

  /* ── 卡片查看器 ── */
  .viewer {
    display: flex;
    align-items: center;
    gap: var(--gap);
  }

  .card-stage {
    position: relative;
    width: var(--card-w);
    height: var(--card-h);
    flex-shrink: 0;
  }

  .card-slot {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border-radius: 16px;
    overflow: hidden;
    box-shadow:
      0 8px 40px rgba(0,0,0,0.45),
      0 0 0 1px rgba(255,255,255,0.08);
    transition: transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.35s ease;
    will-change: transform, opacity;
  }
  .card-slot.exit-left  { transform:translateX(-120%) scale(0.92); opacity:0; pointer-events:none; }
  .card-slot.exit-right { transform:translateX(120%) scale(0.92); opacity:0; pointer-events:none; }
  .card-slot.enter-left  { transform:translateX(-80%) scale(0.92); opacity:0; pointer-events:none; }
  .card-slot.enter-right { transform:translateX(80%) scale(0.92); opacity:0; pointer-events:none; }
  .card-slot.active { transform:translateX(0) scale(1); opacity:1; }

  .card-inner {
    width: 100%;
    height: 100%;
    background: #fff;
    padding: 28px 22px 32px;
    overflow-y: auto;
    overflow-x: hidden;
    font-family: -apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
    font-size: 12px;
    line-height: 1.7;
    color: #333;
    letter-spacing: 0.3px;
    scrollbar-width: thin;
    scrollbar-color: #ccc transparent;
  }
  .card-inner::-webkit-scrollbar { width: 3px; }
  .card-inner::-webkit-scrollbar-thumb { background:#ccc; border-radius:4px; }

  /* 卡片内复用 all-variants 的 section 样式 */
  .card-inner section { max-width: 100% !important; }
  .card-inner .variant-label {
    font-size: 7px;
    color: #888;
    margin: 0 0 3px;
    letter-spacing: 1px;
  }
  .card-inner .section-header {
    display: flex;
    align-items: flex-start;
    gap: 6px;
    margin-bottom: 14px;
    flex-shrink: 0;
  }
  .card-inner .section-header .bar {
    width: 3px;
    height: 16px;
    background: #171717;
    flex-shrink: 0;
  }
  .card-inner .section-num {
    font-size: 9px;
    font-weight: bold;
    color: #888;
    letter-spacing: 2px;
  }
  .card-inner .section-title {
    font-size: 14px;
    font-weight: bold;
    color: #171717;
  }

  /* ── 箭头 ── */
  .nav-arrow {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.8);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    backdrop-filter: blur(8px);
  }
  .nav-arrow:hover { background:rgba(255,255,255,0.14); border-color:rgba(255,255,255,0.4); color:#fff; }
  .nav-arrow:active { transform:scale(0.94); }
  .nav-arrow:disabled { opacity:0.2; cursor:default; pointer-events:none; }

  /* ── 底部指示器 ── */
  .indicators { display:flex; gap:8px; margin-top:18px; flex-wrap:wrap; justify-content:center; max-width:500px; }
  .indicators .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    cursor: pointer;
    transition: all 0.2s;
  }
  .indicators .dot.active { background:#fff; transform:scale(1.5); }
  .indicators .dot:hover { background:rgba(255,255,255,0.55); }

  .counter {
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    letter-spacing: 1px;
    margin-top: 6px;
    font-variant-numeric: tabular-nums;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #333;
    color: #fff;
    padding: 12px 28px;
    border-radius: 30px;
    font-size: 13px;
    letter-spacing: 0.5px;
    opacity: 0;
    pointer-events: none;
    transition: all 0.35s cubic-bezier(0.25,0.46,0.45,0.94);
    z-index: 100;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* ── 响应式 ── */
  @media (max-width: 640px) {
    :root { --card-w: 300px; --card-h: 400px; --gap: 8px; }
    .nav-arrow { width:36px; height:36px; font-size:16px; }
    .card-inner { padding: 20px 14px 22px; }
  }
  @media (max-width: 380px) {
    :root { --card-w: 260px; --card-h: 346px; --gap: 4px; }
    .nav-arrow { width:28px; height:28px; font-size:13px; }
    .card-inner { padding: 16px 10px 18px; }
  }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="toolbar">
  <span class="loading-text" id="loadingMsg">⏳ 加载变体数据...</span>
  <button class="btn-download" id="btnDownload" onclick="downloadCard()" style="display:none" title="下载当前卡片为 4K PNG">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2">
      <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    下载 4K 图片
  </button>
</div>

<div class="viewer">
  <button class="nav-arrow" id="btnPrev" onclick="prevCard()" title="上一张 (← 键)">◀</button>
  <div class="card-stage" id="cardStage"></div>
  <button class="nav-arrow" id="btnNext" onclick="nextCard()" title="下一张 (→ 键)">▶</button>
</div>

<div class="indicators" id="indicators"></div>
<div class="counter" id="counter"></div>

<script>
// ============================================================
// 从 all-variants.html 解析变体数据
// ============================================================
let cardsData = [];
let currentIdx = 0;
let total = 0;
let renderedSlots = [];

const stage = document.getElementById('cardStage');
const btnPrev = document.getElementById('btnPrev');
const btnNext = document.getElementById('btnNext');
const btnDownload = document.getElementById('btnDownload');
const loadingMsg = document.getElementById('loadingMsg');
const counterEl = document.getElementById('counter');

// ── 加载预解析的变体数据 (variants-data.json) ──
async function loadData() {
  try {
    const resp = await fetch('variants-data.json');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    cardsData = await resp.json();
    total = cardsData.length;
    
    if (total === 0) {
      loadingMsg.textContent = '⚠️ 未找到变体数据';
      return;
    }
    
    loadingMsg.textContent = `✅ ${total} 个变体 · ${cardsData[cardsData.length-1]?.sectionNum || '?'} 个组件`;
    btnDownload.style.display = 'inline-flex';
    
    render();
  } catch (err) {
    console.error(err);
    loadingMsg.textContent = '❌ 加载失败: ' + err.message;
  }
}

// ── 去除外层 wrapper，只保留内部内容 ──
function unwrapVariant(html) {
  const prefix = '<section style="margin:8px 0;padding:4px 0;box-sizing:border-box">';
  if (html.startsWith(prefix)) {
    // 去掉开头 prefix 和最后的 </section>
    const inner = html.substring(prefix.length);
    const lastClose = inner.lastIndexOf('</section>');
    if (lastClose !== -1) return inner.substring(0, lastClose);
  }
  return html;
}

// ── 创建卡片 DOM ──
function createCardEl(idx) {
  const wrapper = document.createElement('div');
  wrapper.className = 'card-slot';
  wrapper.setAttribute('data-idx', idx);

  const inner = document.createElement('div');
  inner.className = 'card-inner';
  
  const card = cardsData[idx];
  const innerHtml = unwrapVariant(card.html);
  
  inner.innerHTML = `
    <div class="section-header">
      <div class="bar"></div>
      <div>
        <p class="section-num">${card.sectionNum}</p>
        <p class="section-title">${card.sectionName}</p>
      </div>
    </div>
    ${innerHtml}
  `;
  
  wrapper.appendChild(inner);
  return wrapper;
}

// ── 渲染 ──
function render() {
  stage.innerHTML = '';
  renderedSlots = [];
  
  const el = createCardEl(currentIdx);
  el.classList.add('active');
  stage.appendChild(el);
  renderedSlots.push({ idx: currentIdx, el });
  
  updateArrows();
  updateCounter();
}

// ── 切换 ──
function goTo(idx) {
  if (idx === currentIdx || idx < 0 || idx >= total) return;

  const oldIdx = currentIdx;
  const direction = idx > currentIdx ? 'right' : 'left';
  currentIdx = idx;

  // 旧卡片飞出
  const oldSlot = renderedSlots.find(s => s.idx === oldIdx);
  if (oldSlot) {
    oldSlot.el.classList.remove('active');
    oldSlot.el.classList.add(direction === 'right' ? 'exit-left' : 'exit-right');
  }

  // 新卡片
  let newSlot = renderedSlots.find(s => s.idx === idx);
  if (!newSlot) {
    const el = createCardEl(idx);
    el.classList.add(direction === 'right' ? 'enter-right' : 'enter-left');
    stage.appendChild(el);
    renderedSlots.push({ idx, el });
    void el.offsetWidth;
    el.classList.remove('enter-right', 'enter-left');
    el.classList.add('active');
  } else {
    newSlot.el.classList.remove('exit-left', 'exit-right', 'enter-left', 'enter-right');
    newSlot.el.classList.add('active');
  }

  // 清理远卡片
  setTimeout(() => {
    renderedSlots = renderedSlots.filter(({ idx: i, el }) => {
      if (Math.abs(i - currentIdx) > 1) { el.remove(); return false; }
      return true;
    });
  }, 500);

  updateArrows();
  updateCounter();
}

function nextCard() { goTo(currentIdx + 1); }
function prevCard() { goTo(currentIdx - 1); }

function updateArrows() {
  btnPrev.disabled = currentIdx <= 0;
  btnNext.disabled = currentIdx >= total - 1;
}

function updateCounter() {
  counterEl.textContent = `${currentIdx + 1} / ${total}`;
}

// ── 键盘 ──
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); nextCard(); }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); prevCard(); }
  if (e.key === 'Home') { e.preventDefault(); goTo(0); }
  if (e.key === 'End') { e.preventDefault(); goTo(total - 1); }
});

// ── 触摸 ──
let touchStartX = 0, touchStartY = 0;
stage.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
stage.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
    if (dx < 0) nextCard(); else prevCard();
  }
});

// ── 下载 4K ──
async function downloadCard() {
  const toast = document.getElementById('toast');
  const currentSlot = renderedSlots.find(s => s.idx === currentIdx);
  if (!currentSlot) return;

  const cardInner = currentSlot.el.querySelector('.card-inner');
  const btn = document.getElementById('btnDownload');

  btn.textContent = '⏳ 渲染中...';
  btn.disabled = true;
  toast.textContent = '正在生成 4K 图片...';
  toast.classList.add('show');

  try {
    const rect = cardInner.getBoundingClientRect();
    const scale = 2880 / rect.width;

    const canvas = await html2canvas(cardInner, {
      scale: scale,
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#ffffff',
      logging: false,
      windowWidth: cardInner.scrollWidth,
      windowHeight: cardInner.scrollHeight,
    });

    const link = document.createElement('a');
    const card = cardsData[currentIdx];
    const safeLabel = `${card.code}_${card.sectionNum}_${card.name}`.replace(/[\/\\:*?"<>|]/g, '-');
    link.download = `WeMD_${safeLabel}.png`;
    link.href = canvas.toDataURL('image/png', 1.0);
    link.click();

    toast.textContent = `✅ 已下载！${Math.round(canvas.width)}×${Math.round(canvas.height)} px`;
    setTimeout(() => toast.classList.remove('show'), 2500);
  } catch (err) {
    console.error(err);
    toast.textContent = '❌ 生成失败，请重试';
    setTimeout(() => toast.classList.remove('show'), 2000);
  } finally {
    btn.innerHTML = `<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> 下载 4K 图片`;
    btn.disabled = false;
  }
}

// ── 启动 ──
loadData();
</script>

</body>
</html>
