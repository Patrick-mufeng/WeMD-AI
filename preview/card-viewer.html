<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeMD 组件卡片 — 3:4 预览</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
  :root {
    --card-w: 420px;
    --card-h: 560px;
    --gap: 28px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #1a1a1a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    user-select: none;
    -webkit-user-select: none;
    padding: 20px;
  }

  /* ── 顶部工具栏 ── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn-download {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 24px;
    background: #fff;
    color: #171717;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }
  .btn-download:hover {
    background: #e0e0e0;
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .btn-download:active {
    transform: scale(0.97);
  }

  .btn-download svg {
    width: 18px; height: 18px;
  }

  /* ── 主容器 ── */
  .viewer {
    display: flex;
    align-items: center;
    gap: var(--gap);
  }

  /* ── 箭头按钮 ── */
  .nav-arrow {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.06);
    color: #fff;
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    backdrop-filter: blur(8px);
  }
  .nav-arrow:hover {
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.5);
  }
  .nav-arrow:active {
    transform: scale(0.93);
  }
  .nav-arrow.disabled {
    opacity: 0.2;
    pointer-events: none;
  }

  /* ── 卡片舞台 ── */
  .card-stage {
    position: relative;
    width: var(--card-w);
    height: var(--card-h);
    flex-shrink: 0;
  }

  .card-slot {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border-radius: 16px;
    overflow: hidden;
    box-shadow:
      0 8px 40px rgba(0,0,0,0.5),
      0 0 0 1px rgba(255,255,255,0.08);
    transition: transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.35s ease;
    will-change: transform, opacity;
  }

  .card-slot.exit-left {
    transform: translateX(-120%) scale(0.92);
    opacity: 0;
    pointer-events: none;
  }
  .card-slot.exit-right {
    transform: translateX(120%) scale(0.92);
    opacity: 0;
    pointer-events: none;
  }
  .card-slot.enter-left {
    transform: translateX(-80%) scale(0.92);
    opacity: 0;
    pointer-events: none;
  }
  .card-slot.enter-right {
    transform: translateX(80%) scale(0.92);
    opacity: 0;
    pointer-events: none;
  }
  .card-slot.active {
    transform: translateX(0) scale(1);
    opacity: 1;
  }

  /* ── 卡片内部 ── */
  .card-inner {
    width: 100%;
    height: 100%;
    background: #fff;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 32px 28px 36px;
    display: flex;
    flex-direction: column;
    scrollbar-width: thin;
    scrollbar-color: #ccc transparent;
  }
  .card-inner::-webkit-scrollbar { width: 3px; }
  .card-inner::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }

  /* 标题栏通用 */
  .card-section-head {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 14px;
    flex-shrink: 0;
  }
  .card-section-head .bar {
    width: 3px;
    height: 18px;
    background: #171717;
    flex-shrink: 0;
  }
  .card-section-head .num {
    font-size: 10px;
    font-weight: bold;
    color: #888;
    letter-spacing: 1.5px;
  }
  .card-section-head .title {
    font-size: 15px;
    font-weight: bold;
    color: #171717;
  }

  /* ── 底部指示器 ── */
  .indicators {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }
  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    cursor: pointer;
    transition: all 0.25s;
  }
  .dot.active {
    background: #fff;
    box-shadow: 0 0 8px rgba(255,255,255,0.4);
    transform: scale(1.2);
  }
  .dot:hover {
    background: rgba(255,255,255,0.5);
  }

  .counter {
    color: rgba(255,255,255,0.5);
    font-size: 13px;
    margin-top: 8px;
    letter-spacing: 1px;
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #fff;
    color: #171717;
    padding: 12px 28px;
    border-radius: 10px;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.5px;
    box-shadow: 0 6px 30px rgba(0,0,0,0.35);
    z-index: 999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s;
  }
  .toast.show {
    opacity: 1;
    pointer-events: auto;
  }

  /* ── 响应式 ── */
  @media (max-width: 700px) {
    :root {
      --card-w: 300px;
      --card-h: 400px;
      --gap: 8px;
    }
    .nav-arrow { width: 36px; height: 36px; font-size: 16px; }
    .card-inner { padding: 20px 16px 24px; }
  }
  @media (max-width: 420px) {
    :root {
      --card-w: 260px;
      --card-h: 347px;
      --gap: 4px;
    }
    .nav-arrow { width: 30px; height: 30px; font-size: 14px; border-width: 1.5px; }
  }
</style>
</head>

<!-- Toast -->
<div class="toast" id="toast"></div>

// ============================================================
// 状态
// ============================================================
let currentIdx = 0;
const total = cardsData.length;
let renderedSlots = []; // { idx, el }

// ============================================================
// 初始化
// ============================================================
const stage = document.getElementById('cardStage');
const indicatorsRow = document.getElementById('indicators');
const counterEl = document.getElementById('counter');
const btnPrev = document.getElementById('btn-prev');
const btnNext = document.getElementById('btn-next');

function buildIndicators() {
  indicatorsRow.innerHTML = '';
  for (let i = 0; i < total; i++) {
    const dot = document.createElement('span');
    dot.className = 'dot' + (i === currentIdx ? ' active' : '');
    dot.addEventListener('click', () => goTo(i));
    indicatorsRow.appendChild(dot);
  }
}

function updateCounter() {
  counterEl.textContent = `${currentIdx + 1} / ${total}`;
}

function updateArrows() {
  btnPrev.classList.toggle('disabled', currentIdx === 0);
  btnNext.classList.toggle('disabled', currentIdx === total - 1);
}

function updateIndicators() {
  const dots = indicatorsRow.querySelectorAll('.dot');
  dots.forEach((d, i) => d.classList.toggle('active', i === currentIdx));
}

// ── 创建单个卡片 DOM ──
function createCardEl(idx) {
  const wrapper = document.createElement('div');
  wrapper.className = 'card-slot';
  wrapper.setAttribute('data-idx', idx);

  const inner = document.createElement('div');
  inner.className = 'card-inner';
  inner.innerHTML = cardsData[idx].html;
  wrapper.appendChild(inner);
  return wrapper;
}

// ── 渲染当前卡片 + 相邻 ──
function render() {
  // 清空舞台
  stage.innerHTML = '';
  renderedSlots = [];

  // 需要渲染的索引：当前 + 左右各1
  const indices = new Set();
  indices.add(currentIdx);
  if (currentIdx > 0) indices.add(currentIdx - 1);
  if (currentIdx < total - 1) indices.add(currentIdx + 1);

  indices.forEach(idx => {
    const el = createCardEl(idx);
    stage.appendChild(el);
    renderedSlots.push({ idx, el });
  });

  // 设置动画类名
  renderedSlots.forEach(({ idx, el }) => {
    el.classList.remove('active', 'exit-left', 'exit-right', 'enter-left', 'enter-right');
    if (idx === currentIdx) {
      el.classList.add('active');
    } else if (idx < currentIdx) {
      el.classList.add('exit-left');
    } else {
      el.classList.add('exit-right');
    }
  });

  updateArrows();
  updateCounter();
  updateIndicators();
}

// ── 切换 ──
function goTo(idx) {
  if (idx === currentIdx || idx < 0 || idx >= total) return;

  const oldIdx = currentIdx;
  const direction = idx > currentIdx ? 'right' : 'left';
  currentIdx = idx;

  // 先让旧卡片飞出
  const oldSlot = renderedSlots.find(s => s.idx === oldIdx);
  if (oldSlot) {
    oldSlot.el.classList.remove('active');
    oldSlot.el.classList.add(direction === 'right' ? 'exit-left' : 'exit-right');
  }

  // 检查新卡片是否已渲染
  let newSlot = renderedSlots.find(s => s.idx === idx);

  if (!newSlot) {
    // 需要创建新卡片
    const el = createCardEl(idx);
    el.classList.add(direction === 'right' ? 'enter-right' : 'enter-left');
    stage.appendChild(el);
    renderedSlots.push({ idx, el });
    newSlot = { idx, el };

    // 强制回流后添加 active
    void el.offsetWidth;
    el.classList.remove('enter-right', 'enter-left');
    el.classList.add('active');
  } else {
    // 已存在，只需要改类名
    newSlot.el.classList.remove('exit-left', 'exit-right', 'enter-left', 'enter-right');
    newSlot.el.classList.add('active');
  }

  // 清理远离的卡片（保留当前 ± 1）
  setTimeout(() => {
    renderedSlots = renderedSlots.filter(({ idx: i, el }) => {
      if (Math.abs(i - currentIdx) > 1) {
        el.remove();
        return false;
      }
      return true;
    });
  }, 500);

  updateArrows();
  updateCounter();
  updateIndicators();
}

function nextCard() { goTo(currentIdx + 1); }
function prevCard() { goTo(currentIdx - 1); }

// ── 键盘 ──
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); nextCard(); }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); prevCard(); }
  if (e.key === 'Home') { e.preventDefault(); goTo(0); }
  if (e.key === 'End') { e.preventDefault(); goTo(total - 1); }
});

// ── 触摸滑动 ──
let touchStartX = 0;
let touchStartY = 0;
stage.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
stage.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
    if (dx < 0) nextCard();
    else prevCard();
  }
});

// ── 下载 4K 图片 ──
async function downloadCard() {
  const toast = document.getElementById('toast');
  const currentSlot = renderedSlots.find(s => s.idx === currentIdx);
  if (!currentSlot) return;

  const cardInner = currentSlot.el.querySelector('.card-inner');
  const btn = document.querySelector('.btn-download');

  // 显示 loading
  btn.textContent = '⏳ 渲染中...';
  btn.disabled = true;
  toast.textContent = '正在生成 4K 图片...';
  toast.classList.add('show');

  try {
    // 获取卡片实际尺寸
    const rect = cardInner.getBoundingClientRect();
    const baseW = rect.width;
    const baseH = rect.height;

    // 目标 4K：长边 ~3840px，短边 ~2880px（3:4）
    const targetLong = 3840;
    const targetShort = 2880;
    // 卡片是 3:4，所以宽短高长
    const scale = targetShort / baseW; // 让宽度达到 2880px

    const canvas = await html2canvas(cardInner, {
      scale: scale,
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#ffffff',
      logging: false,
      windowWidth: cardInner.scrollWidth,
      windowHeight: cardInner.scrollHeight,
    });

    // 下载
    const link = document.createElement('a');
    const label = cardsData[currentIdx].label || 'WeMD组件';
    link.download = `WeMD_${String(currentIdx + 1).padStart(2, '0')}_${label.replace(/[\/\\:*?"<>|]/g, '-')}.png`;
    link.href = canvas.toDataURL('image/png', 1.0);
    link.click();

    const actualW = Math.round(canvas.width);
    const actualH = Math.round(canvas.height);
    toast.textContent = `✅ 已下载！${actualW}×${actualH} px`;
    setTimeout(() => toast.classList.remove('show'), 2500);
  } catch (err) {
    console.error(err);
    toast.textContent = '❌ 生成失败，请重试';
    setTimeout(() => toast.classList.remove('show'), 2000);
  } finally {
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> 下载 4K 图片`;
    btn.disabled = false;
  }
}

// ── 启动 ──
buildIndicators();
render();
</script>
